<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@300;400;500&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      color: #202124;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #e8eaed;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      font-size: 20px;
      line-height: 28px;
      text-align: center;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #202124;
      letter-spacing: 0.1px;
    }

    /* ── Timer card ── */
    .content {
      padding: 16px;
    }

    .timer-card {
      background: #f0f4ff;
      border-radius: 16px;
      padding: 20px 16px 16px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .timer-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e8f0fe;
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: #1a73e8;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .timer-value {
      font-family: Roboto, Arial, sans-serif;
      font-size: 52px;
      font-weight: 300;
      color: #1a73e8;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 14px;
    }

    .timer-value.cat-active {
      font-size: 16px;
      font-weight: 500;
      color: #e8710a;
      letter-spacing: 0;
      margin-bottom: 14px;
    }

    /* Progress bar */
    .progress-track {
      height: 4px;
      background: #c5cae9;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1a73e8;
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }

    /* ── Settings ── */
    .settings {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 14px 48px 6px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: #1a73e8;
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 6px;
      font-size: 11px;
      font-weight: 500;
      color: #5f6368;
      letter-spacing: 0.3px;
      pointer-events: none;
      transition: color 0.15s;
    }

    .field input:focus + label {
      color: #1a73e8;
    }

    .field .unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #9aa0a6;
      pointer-events: none;
    }

    /* Stepper buttons */
    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stepper {
      display: flex;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
      align-items: stretch;
    }

    .stepper:focus-within {
      border-color: #1a73e8;
    }

    .stepper input {
      flex: 1;
      border: none;
      padding: 10px 0;
      font-size: 20px;
      font-weight: 400;
      font-family: inherit;
      color: #202124;
      text-align: center;
      outline: none;
      background: transparent;
      appearance: textfield;
      -moz-appearance: textfield;
      min-width: 0;
    }

    .stepper input::-webkit-inner-spin-button,
    .stepper input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .stepper-btn {
      width: 36px;
      border: none;
      background: transparent;
      color: #5f6368;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }

    .stepper-btn:hover {
      background: #f1f3f4;
      color: #1a73e8;
    }

    .stepper-divider {
      width: 1px;
      background: #dadce0;
      align-self: stretch;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #5f6368;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.25px;
      border: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1765cc;
      box-shadow: 0 1px 4px rgba(26, 115, 232, 0.35);
    }

    .btn-dismiss {
      background: #fff;
      color: #5f6368;
      border: 1.5px solid #dadce0;
      display: none;
    }

    .btn-dismiss:hover {
      background: #fef9f0;
      border-color: #e8710a;
      color: #e8710a;
    }

    .saved-msg {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: #137333;
      display: none;
      padding: 2px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🐱</div>
    <h1>Cat Gatekeeper</h1>
  </div>

  <div class="content">

    <div class="timer-card">
      <div class="timer-chip">⏱ Next break</div>
      <div class="timer-value" id="timerDisplay">--:--</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="settings">
      <div>
        <div class="field-label" data-i18n="usageLimitLabel"></div>
        <div class="stepper" id="usageLimitStepper">
          <button class="stepper-btn" data-target="usageLimit" data-delta="-1">−</button>
          <div class="stepper-divider"></div>
          <input type="number" id="usageLimit" min="1" max="480" value="60">
          <div class="stepper-divider"></div>
          <button class="stepper-btn" data-target="usageLimit" data-delta="1">+</button>
        </div>
      </div>

      <div>
        <div class="field-label" data-i18n="breakTimeLabel"></div>
        <div class="stepper" id="breakTimeStepper">
          <button class="stepper-btn" data-target="breakTime" data-delta="-1">−</button>
          <div class="stepper-divider"></div>
          <input type="number" id="breakTime" min="1" max="60" value="5">
          <div class="stepper-divider"></div>
          <button class="stepper-btn" data-target="breakTime" data-delta="1">+</button>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="dismissBtn" class="btn btn-dismiss" data-i18n="dismissButton"></button>
      <button id="saveBtn" class="btn btn-primary" data-i18n="saveButton"></button>
      <div class="saved-msg" id="savedMsg" data-i18n="savedMessage"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
